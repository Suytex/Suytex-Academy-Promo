<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suytex Portafolio Experience</title>
  <meta name="description" content="Aprende a construir un portafolio de acciones con método — en 5 días." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    /* ─── TOKENS ─────────────────────────────────────────────── */
    :root {
      --bg:         #0a0a0a;
      --bg-surface: #111111;
      --bg-card:    #161616;
      --border:     #222222;
      --border-hi:  #333333;
      --gold:       #d4a855;
      --gold-dim:   #9a7a3a;
      --text:       #f0ede8;
      --text-muted: #888880;
      --text-dim:   #555550;
      --green:      #22c55e;
      --red:        #ef4444;
      --radius:     14px;
      --radius-sm:  8px;
      --max-w:      1080px;
    }

    /* ─── RESET ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }
    img { max-width: 100%; display: block; }
    a { color: inherit; text-decoration: none; }

    /* ─── LOADING ────────────────────────────────────────────── */
    #app { min-height: 100vh; }
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: var(--text-muted);
      font-size: 1rem;
      letter-spacing: 0.1em;
    }
    .loading::after {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--gold);
      border-radius: 50%;
      margin-left: 10px;
      animation: pulse 1s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* ─── LAYOUT HELPERS ─────────────────────────────────────── */
    .section { padding: 6rem 1.5rem; }
    .container { max-width: var(--max-w); margin: 0 auto; }

    /* ─── TYPOGRAPHY (shared) ────────────────────────────────── */
    h2 { font-size: clamp(1.75rem, 4vw, 2.5rem); font-weight: 800; line-height: 1.15; }
    h3 { font-size: 1.2rem; font-weight: 700; }
    p  { color: var(--text-muted); line-height: 1.75; }
    strong { color: var(--text); }
    ul { list-style: none; }

    /* ─── SECTION LABEL ──────────────────────────────────────── */
    .section-label {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.25rem;
    }

    /* ════════════════════════════════════════════════════════════
       HERO
    ════════════════════════════════════════════════════════════ */
    .section--hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 5rem 1.5rem;
      background:
        radial-gradient(ellipse 70% 50% at 50% -10%, rgba(212,168,85,.12) 0%, transparent 60%),
        var(--bg);
      text-align: center;
    }
    .section--hero .container { width: 100%; }

    .section--hero h1 {
      font-size: clamp(0.75rem, 1.5vw, 0.9rem);
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.5rem;
    }
    .section--hero h2 {
      font-size: clamp(2.2rem, 6vw, 4.25rem);
      font-weight: 900;
      line-height: 1.08;
      color: var(--text);
      max-width: 820px;
      margin: 0 auto 1.5rem;
    }
    .section--hero h2 em {
      font-style: normal;
      color: var(--gold);
    }
    .section--hero p {
      font-size: clamp(1rem, 2vw, 1.25rem);
      color: var(--text-muted);
      max-width: 540px;
      margin: 0 auto 2.5rem;
    }
    .section--hero a {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: var(--gold);
      color: #0a0a0a;
      font-weight: 800;
      font-size: 1.05rem;
      padding: .9rem 2.2rem;
      border-radius: 50px;
      transition: background .2s, transform .15s;
      letter-spacing: -.01em;
    }
    .section--hero a:hover {
      background: #e8bc68;
      transform: translateY(-2px);
    }

    /* ════════════════════════════════════════════════════════════
       PAIN
    ════════════════════════════════════════════════════════════ */
    .section--pain { background: var(--bg-surface); }
    .section--pain h2 {
      margin-bottom: 2.5rem;
      text-align: center;
    }
    .section--pain ul {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.25rem;
    }
    .section--pain li {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.6rem;
      transition: border-color .2s;
    }
    .section--pain li:hover { border-color: var(--border-hi); }
    .section--pain li strong { display: block; color: var(--text); margin-bottom: .35rem; font-size: 1rem; }

    /* ════════════════════════════════════════════════════════════
       PROBLEM
    ════════════════════════════════════════════════════════════ */
    .section--problem {
      text-align: center;
      background:
        radial-gradient(ellipse 60% 60% at 50% 50%, rgba(212,168,85,.06) 0%, transparent 70%),
        var(--bg);
    }
    .section--problem h2 {
      font-size: clamp(1.75rem, 4.5vw, 3rem);
      color: var(--text-muted);
      font-weight: 700;
      margin-bottom: 1.25rem;
    }
    .section--problem p:first-of-type strong {
      font-size: clamp(1.75rem, 4.5vw, 3rem);
      color: var(--gold);
      font-weight: 900;
      display: block;
      margin-bottom: 2rem;
    }
    .section--problem p {
      max-width: 660px;
      margin: 0 auto 1rem;
      font-size: 1.1rem;
    }

    /* ════════════════════════════════════════════════════════════
       TRANSFORMATION
    ════════════════════════════════════════════════════════════ */
    .section--transformation { background: var(--bg-surface); }
    .section--transformation h2 { margin-bottom: .75rem; }
    .section--transformation > .container > p {
      color: var(--text-muted);
      margin-bottom: 2.25rem;
    }
    .section--transformation ul {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.25rem;
    }
    .section--transformation li {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-top: 3px solid var(--gold);
      border-radius: var(--radius);
      padding: 1.6rem;
    }
    .section--transformation li strong { font-size: 1.05rem; display: block; margin-bottom: .4rem; }

    /* ════════════════════════════════════════════════════════════
       OUTCOMES
    ════════════════════════════════════════════════════════════ */
    .section--outcomes {}
    .section--outcomes h2 { margin-bottom: 2.25rem; }
    .section--outcomes ul {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: 1rem;
    }
    .section--outcomes li {
      display: flex;
      gap: 1rem;
      padding: 1.25rem 1.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .section--outcomes li::before {
      content: '';
      display: none;
    }

    /* ════════════════════════════════════════════════════════════
       METHOD
    ════════════════════════════════════════════════════════════ */
    .section--method { background: var(--bg-surface); }
    .section--method h2 { margin-bottom: .5rem; }
    .section--method > .container > p {
      color: var(--gold-dim);
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      margin-bottom: 2.25rem;
    }
    .section--method ul {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.1rem;
    }
    .section--method li {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem 1.5rem;
      transition: border-color .2s, transform .2s;
    }
    .section--method li:hover {
      border-color: var(--gold-dim);
      transform: translateY(-3px);
    }
    .section--method li strong { display: block; color: var(--text); margin-bottom: .35rem; font-size: .95rem; }

    /* ════════════════════════════════════════════════════════════
       PHILOSOPHY
    ════════════════════════════════════════════════════════════ */
    .section--philosophy {
      text-align: center;
      background:
        radial-gradient(ellipse 80% 80% at 50% 50%, rgba(212,168,85,.07) 0%, transparent 70%),
        var(--bg);
      padding: 7rem 1.5rem;
    }
    .section--philosophy h2 { color: var(--text-muted); font-size: clamp(1.5rem, 3vw, 2rem); margin-bottom: 1.5rem; }
    .section--philosophy p:first-of-type strong {
      display: block;
      font-size: clamp(2rem, 5vw, 3.25rem);
      font-weight: 900;
      color: var(--gold);
      margin-bottom: 1.5rem;
      line-height: 1.1;
    }
    .section--philosophy p {
      max-width: 600px;
      margin: 0 auto;
      font-size: 1.1rem;
    }

    /* ════════════════════════════════════════════════════════════
       FORMAT
    ════════════════════════════════════════════════════════════ */
    .section--format { background: var(--bg-surface); }
    .section--format h2 { margin-bottom: 2.25rem; }
    .section--format ul {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.25rem;
    }
    .section--format li {
      padding: 1.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .section--format li strong { display: block; margin-bottom: .4rem; font-size: 1rem; }

    /* ════════════════════════════════════════════════════════════
       INCLUDES
    ════════════════════════════════════════════════════════════ */
    .section--includes {}
    .section--includes h2 { margin-bottom: 2.25rem; }
    .section--includes ul {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: .85rem;
    }
    .section--includes li {
      display: flex;
      gap: .85rem;
      align-items: flex-start;
      padding: 1.1rem 1.25rem;
      border-left: 3px solid var(--gold);
      background: var(--bg-card);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }
    .section--includes li strong { display: block; margin-bottom: .2rem; color: var(--text); }

    /* ════════════════════════════════════════════════════════════
       FOR-WHO
    ════════════════════════════════════════════════════════════ */
    .section--for-who { background: var(--bg-surface); }
    .section--for-who h2 { text-align: center; margin-bottom: 2.5rem; }
    .for-who-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    @media (max-width: 640px) { .for-who-grid { grid-template-columns: 1fr; } }
    .for-who-col {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
    }
    .for-who-yes { border-top: 3px solid var(--green); }
    .for-who-no  { border-top: 3px solid var(--red); }
    .for-who-col h3 { font-size: 1.1rem; margin-bottom: 1.25rem; }
    .for-who-yes h3 { color: var(--green); }
    .for-who-no  h3 { color: var(--red); }
    .for-who-col ul { display: flex; flex-direction: column; gap: .65rem; }
    .for-who-col li { color: var(--text-muted); font-size: .95rem; }
    .section--for-who > .container > p {
      text-align: center;
      margin-top: 2rem;
      color: var(--text-dim);
      font-style: italic;
    }

    /* ════════════════════════════════════════════════════════════
       PRICING
    ════════════════════════════════════════════════════════════ */
    .section--pricing {
      background:
        radial-gradient(ellipse 60% 60% at 50% 0%, rgba(212,168,85,.1) 0%, transparent 60%),
        var(--bg);
      text-align: center;
    }
    .section--pricing h2 { color: var(--text-muted); margin-bottom: 2rem; }
    .pricing-card {
      display: inline-block;
      background: var(--bg-card);
      border: 1px solid var(--gold-dim);
      border-radius: 20px;
      padding: 3rem 3.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    .price-main strong {
      display: block;
      font-size: clamp(2.5rem, 6vw, 3.75rem);
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
      margin-bottom: .25rem;
    }
    .price-main { margin-bottom: 1rem; }
    .price-subtitle { color: var(--text-muted); margin-bottom: 1.75rem; font-size: .95rem; }
    .price-seats strong {
      display: block;
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--text);
    }
    .price-seats { margin-bottom: .5rem; }
    .price-note { color: var(--text-muted); font-size: .9rem; margin-bottom: 2rem; }
    .price-closing {
      font-size: .95rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
      line-height: 1.65;
    }

    /* ════════════════════════════════════════════════════════════
       FAQ
    ════════════════════════════════════════════════════════════ */
    .section--faq { background: var(--bg-surface); }
    .section--faq h2 { margin-bottom: 2.25rem; }
    .faq-list { display: flex; flex-direction: column; gap: .75rem; max-width: 720px; }
    .faq-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color .2s;
    }
    .faq-item:hover { border-color: var(--border-hi); }
    .faq-q {
      padding: 1.1rem 1.5rem;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      font-weight: 600;
      color: var(--text);
      user-select: none;
    }
    .faq-q::after {
      content: '+';
      font-size: 1.4rem;
      font-weight: 300;
      color: var(--gold);
      flex-shrink: 0;
      transition: transform .2s;
    }
    .faq-item.open .faq-q::after { transform: rotate(45deg); }
    .faq-a {
      max-height: 0;
      overflow: hidden;
      transition: max-height .3s ease;
    }
    .faq-item.open .faq-a { max-height: 200px; }
    .faq-a-inner {
      padding: 0 1.5rem 1.25rem;
      color: var(--text-muted);
      font-size: .95rem;
    }

    /* ════════════════════════════════════════════════════════════
       CTA
    ════════════════════════════════════════════════════════════ */
    .section--cta {
      background:
        radial-gradient(ellipse 80% 80% at 50% 50%, rgba(212,168,85,.1) 0%, transparent 60%),
        var(--bg-surface);
      text-align: center;
      padding: 7rem 1.5rem;
    }
    .section--cta h2 {
      font-size: clamp(2rem, 5vw, 3.25rem);
      margin-bottom: 1rem;
    }
    .section--cta p {
      font-size: 1.1rem;
      max-width: 500px;
      margin: 0 auto 1rem;
    }
    .section--cta p strong { color: var(--text); }
    .section--cta em {
      display: block;
      margin-top: 2.5rem;
      color: var(--text-dim);
      font-size: .85rem;
      font-style: normal;
      letter-spacing: .08em;
    }
    .btn-cta {
      display: inline-flex;
      align-items: center;
      gap: .6rem;
      background: var(--gold);
      color: #0a0a0a;
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      padding: 1rem 2.5rem;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      margin-top: 1.5rem;
      transition: background .2s, transform .15s;
      text-decoration: none;
    }
    .btn-cta:hover {
      background: #e8bc68;
      transform: translateY(-2px);
    }

    /* ─── FOOTER ─────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 2rem 1.5rem;
      color: var(--text-dim);
      font-size: .8rem;
      border-top: 1px solid var(--border);
    }

    /* ─── RESPONSIVE ─────────────────────────────────────────── */
    @media (max-width: 640px) {
      .section { padding: 4rem 1.25rem; }
      .section--hero, .section--philosophy, .section--cta { padding: 4.5rem 1.25rem; }
      .pricing-card { padding: 2rem 1.5rem; }
      .section--outcomes ul,
      .section--includes ul { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div id="app">
    <div class="loading">Cargando</div>
  </div>

  <footer id="footer" style="display:none">
    <span id="footer-brand"></span>
  </footer>

  <!-- marked.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>

  <script>
  // ─── MARKDOWN PARSER CONFIG ────────────────────────────────
  marked.setOptions({ breaks: true, gfm: true });

  // ─── PARSE FRONTMATTER ────────────────────────────────────
  function parseFrontmatter(text) {
    const match = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n/);
    if (!match) return { meta: {}, body: text };
    const meta = {};
    match[1].split('\n').forEach(line => {
      const idx = line.indexOf(':');
      if (idx < 0) return;
      const key = line.slice(0, idx).trim();
      const val = line.slice(idx + 1).trim();
      if (key) meta[key] = val;
    });
    return { meta, body: text.slice(match[0].length) };
  }

  // ─── PARSE SECTIONS ───────────────────────────────────────
  function parseSections(body) {
    const parts = body.split(/<!--\s*section:\s*([\w-]+)\s*-->/);
    const sections = [];
    // parts[0] is content before first marker (ignored)
    for (let i = 1; i < parts.length; i += 2) {
      const type    = parts[i].trim();
      const content = (parts[i + 1] || '').trim();
      if (content) sections.push({ type, content });
    }
    return sections;
  }

  // ─── BUILD SECTION HTML ───────────────────────────────────
  function buildSection(section) {
    const html    = marked.parse(section.content);
    const anchor  = section.type === 'cta' ? ' id="reserva"' : '';
    return `<section class="section section--${section.type}"${anchor}>
      <div class="container">${html}</div>
    </section>`;
  }

  // ─── POST-PROCESS: FOR-WHO ────────────────────────────────
  function enhanceForWho() {
    const container = document.querySelector('.section--for-who .container');
    if (!container) return;
    const h3s = container.querySelectorAll('h3');
    if (h3s.length < 2) return;

    const grid   = document.createElement('div');
    grid.className = 'for-who-grid';
    const yesCol = document.createElement('div');
    yesCol.className = 'for-who-col for-who-yes';
    const noCol  = document.createElement('div');
    noCol.className = 'for-who-col for-who-no';

    let current = h3s[0];
    while (current && current !== h3s[1]) {
      const next = current.nextSibling;
      yesCol.appendChild(current);
      current = next;
    }
    while (current) {
      const next = current.nextSibling;
      noCol.appendChild(current);
      current = next;
    }

    grid.appendChild(yesCol);
    grid.appendChild(noCol);

    // Remaining top-level nodes (the closing paragraph)
    const extras = [...container.childNodes];
    container.appendChild(grid);
    extras.forEach(n => container.appendChild(n));
  }

  // ─── POST-PROCESS: PRICING ────────────────────────────────
  function enhancePricing() {
    const container = document.querySelector('.section--pricing .container');
    if (!container) return;

    const card = document.createElement('div');
    card.className = 'pricing-card';

    const nodes = [...container.childNodes];
    let inCard = false;
    const cardNodes = [];
    const outerNodes = [];

    nodes.forEach(n => {
      if (n.nodeName === 'H2') { outerNodes.push(n); inCard = true; }
      else if (inCard) cardNodes.push(n);
      else outerNodes.push(n);
    });

    container.innerHTML = '';
    outerNodes.forEach(n => container.appendChild(n));
    cardNodes.forEach(n => card.appendChild(n));

    const pElements = card.querySelectorAll('p');
    pElements.forEach((p, i) => {
      if (p.querySelector('strong') && i === 0) {
        p.classList.add('price-main');
      } else if (p.querySelector('strong') && i === 2) {
        p.classList.add('price-seats');
      } else if (i === 1) {
        p.classList.add('price-subtitle');
      } else if (i === 3) {
        p.classList.add('price-note');
      } else {
        p.classList.add('price-closing');
      }
    });

    container.appendChild(card);
  }

  // ─── POST-PROCESS: FAQ ACCORDION ─────────────────────────
  function enhanceFAQ() {
    const container = document.querySelector('.section--faq .container');
    if (!container) return;

    const h2 = container.querySelector('h2');
    const paras = [...container.querySelectorAll('p')];

    const faqList = document.createElement('div');
    faqList.className = 'faq-list';

    let i = 0;
    while (i < paras.length) {
      const p = paras[i];
      if (p.querySelector('strong') && p.textContent.trim() === p.querySelector('strong').textContent.trim()) {
        const qText = p.querySelector('strong').textContent;
        const aText = paras[i + 1] ? paras[i + 1].textContent : '';

        const item  = document.createElement('div');
        item.className = 'faq-item';

        const qEl = document.createElement('div');
        qEl.className = 'faq-q';
        qEl.textContent = qText;

        const aEl = document.createElement('div');
        aEl.className = 'faq-a';
        const aInner = document.createElement('div');
        aInner.className = 'faq-a-inner';
        aInner.textContent = aText;
        aEl.appendChild(aInner);

        qEl.addEventListener('click', () => {
          item.classList.toggle('open');
        });

        item.appendChild(qEl);
        item.appendChild(aEl);
        faqList.appendChild(item);
        i += 2;
      } else {
        i++;
      }
    }

    container.innerHTML = '';
    if (h2) container.appendChild(h2);
    container.appendChild(faqList);
  }

  // ─── POST-PROCESS: CTA BUTTON ─────────────────────────────
  function enhanceCTA(meta) {
    const container = document.querySelector('.section--cta .container');
    if (!container) return;

    // Wire up any existing links to whatsapp
    container.querySelectorAll('a').forEach(a => {
      if (meta.whatsapp) {
        a.href = meta.whatsapp;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.classList.add('btn-cta');
      }
    });

    // Add button if no link exists
    if (!container.querySelector('.btn-cta') && meta.whatsapp) {
      const btn = document.createElement('a');
      btn.href    = meta.whatsapp;
      btn.target  = '_blank';
      btn.rel     = 'noopener noreferrer';
      btn.className = 'btn-cta';
      btn.textContent = '💬 Escríbeme "QUIERO" y reserva tu cupo';
      container.insertBefore(btn, container.querySelector('em') || null);
    }
  }

  // ─── POST-PROCESS: HERO LINK ──────────────────────────────
  function enhanceHero(meta) {
    const container = document.querySelector('.section--hero .container');
    if (!container) return;
    container.querySelectorAll('a').forEach(a => {
      const href = a.getAttribute('href');
      if (href === '#reserva' || href === '#') {
        if (meta.whatsapp) {
          a.href   = meta.whatsapp;
          a.target = '_blank';
          a.rel    = 'noopener noreferrer';
        } else {
          a.href = '#reserva';
        }
      }
    });
  }

  // ─── MAIN ─────────────────────────────────────────────────
  async function init() {
    try {
      const response = await fetch('./content.md');
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const text = await response.text();

      const { meta, body } = parseFrontmatter(text);
      const sections = parseSections(body);

      if (meta.brand) {
        document.title = meta.brand;
        document.getElementById('footer-brand').textContent =
          `© ${new Date().getFullYear()} ${meta.brand}`;
      }

      const html = sections.map(buildSection).join('');
      document.getElementById('app').innerHTML = html;

      // Post-process each section
      enhanceForWho();
      enhancePricing();
      enhanceFAQ();
      enhanceCTA(meta);
      enhanceHero(meta);

      document.getElementById('footer').style.display = '';

    } catch (err) {
      document.getElementById('app').innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
                    min-height:100vh;padding:2rem;text-align:center;gap:1rem;">
          <p style="color:#f87171;font-size:1.1rem;">Error al cargar el contenido.</p>
          <p style="color:#888;font-size:.9rem;">
            Este sitio requiere un servidor HTTP.<br>
            Abre <code style="background:#1a1a1a;padding:.2em .4em;border-radius:4px">index.html</code>
            desde un servidor local o GitHub Pages.
          </p>
          <small style="color:#555">${err.message}</small>
        </div>`;
    }
  }

  init();
  </script>
</body>
</html>
